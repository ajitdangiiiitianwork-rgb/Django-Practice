<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipe page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <h1>Welcome to Recipe page</h1>
  <div class="container mt-5">
    <form class="col-6 mx-auto card p-3" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <h2>Add recipe</h2>
      <hr>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Recipe Name</label>
        <input name="recipe_name" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">Recipe Description</label>
        <textarea class="form-control" name="recipe_desc" required></textarea>
      </div>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Recipe Image</label>
        <input name="recipe_image" type="file" class="form-control">
      </div>
      <button type="submit" class="btn btn-success">Add recipe</button>
      
      
    </form>

    <hr>
    
    <div class="container mt-5">
      <div class="mx-auto col 6">
        <form>
          <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Search Food</label>
            <input name="search" type="text" value="{{recipe.recipe_name}}">
          </div>
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>
    </div>

    <hr>

    <table class="table mt-5">
      <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col">Recipe Name</th>
          <th scope="col">Recipe Description</th>
          <th scope="col">Recipe Image</th>
          <th scope="col">Actions</th>
        </tr>
      </thead>
      {% for recipe in recipes %}
      <tbody>
        <tr>
          <th scope="row">{{ forloop.couter }}</th>
          <td>{{recipe.recipe_name}}</td>
          <td>{{recipe.recipe_desc}}</td>
          <td>
            <img src="/media/{{recipe.recipe_image}}" style="height : 100px">
          </td>
          <td>
            <div>
              <a href="/delete_recipes/{{recipe.id}}/" class="btn btn-danger m-1">Delete</a>
              <a href="/update_recipes/{{recipe.id}}/" class="btn btn-success">Update</a>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>

</body>
</html>
