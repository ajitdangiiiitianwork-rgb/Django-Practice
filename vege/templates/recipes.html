<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipe page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <h1>Welcome to Recipe page</h1>
  <div class="container mt-5">
    <form class="col-6 mx-auto card p-3" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <h2>Add recipe</h2>
      <hr>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Recipe Name</label>
        <input name="recipe_name" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">Recipe Description</label>
        <textarea class="form-control" name="recipe_desc" required></textarea>
      </div>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Recipe Image</label>
        <input name="recipe_image" type="file" class="form-control">
      </div>
      <button type="submit" class="btn btn-success">Add recipe</button>
    </form>
  </div>
</body>
</html>
